# Dependabot keeps the hosted Streamlit demo's pinned dependencies current.
# It opens a reviewed PR when a newer version (or a security fix) is available,
# so updates are deliberate instead of silently pulled on the next Cloud build.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/release/web-demo"   # location of the demo's requirements.txt
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  # Keep the GitHub Actions used by CI (CodeQL workflow) current. The actions
  # are pinned to immutable commit SHAs; Dependabot proposes reviewed SHA bumps
  # so a pinned action can still receive security fixes without going stale.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
