# Streamlit configuration for the ElectroSim-CV Analysis Suite web demo.
# Streamlit Community Cloud picks this up automatically.

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
# Streamlit Cloud overrides the port. These keep local `streamlit run`
# behavior consistent with the production hosting.
headless = true
runOnSave = false
# Hardening for a public, no-login demo. CV spreadsheets are tiny, so a low
# upload cap defends the single shared Cloud container against decompression
# bombs / oversized files (an .xlsx is a ZIP — openpyxl can be OOM'd).
maxUploadSize = 10        # MB per file (Streamlit default is 200 — far too high here)
maxMessageSize = 50       # MB — websocket frame cap
enableXsrfProtection = true  # default true; pinned explicitly so it can't regress
enableCORS = true            # default true; pinned explicitly

[client]
showErrorDetails = false  # don't leak stack traces to public demo users
